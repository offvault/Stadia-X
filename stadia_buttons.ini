[Buttons]
; ================================================================
; Stadia X — Ultimate Button Shortcut Configuration
; ================================================================
; Format: CODE=MODIFIER+KEY  (or just KEY for no modifier)
;
; Available modifiers: CTRL, ALT, SHIFT, WIN (or LWIN/RWIN)
;
; Available keys: A-Z, F1-F12, 0-9, SPACE, ENTER, TAB, ESC,
;   UP, DOWN, LEFT, RIGHT, HOME, END, PAGEUP, PAGEDOWN,
;   VOLUME_UP, VOLUME_DOWN, VOLUME_MUTE,
;   MEDIA_NEXT, MEDIA_PREV, MEDIA_PLAY_PAUSE, MEDIA_STOP,
;   PRINTSCREEN, DELETE, INSERT, BACKSPACE
;
; NOTE: When you hold Assistant (A) or Capture (C), the controller 
; will stop sending normal gamepad inputs to your game so your 
; character won't jump or shoot while you are using macros!
; ================================================================

; ----------------------------------------------------------------
; Single-press shortcuts (Tap the button by itself)
; ----------------------------------------------------------------
; A = The Google Assistant Button
; C = The Capture Button
; ----------------------------------------------------------------
A=
C=


; ================================================================
; ASSISTANT CHORDS (Hold Assistant + Press X)
; ================================================================
; --- Face Buttons ---
A_A=ALT+Z
A_B=CTRL+W
A_X=ALT+F9
A_Y=ALT+F1

; --- D-Pad (Supports Hold-to-Repeat) ---
A_UP=CTRL+UP
A_DOWN=CTRL+DOWN
A_LEFT=CTRL+LEFT
A_RIGHT=CTRL+RIGHT

; --- Bumpers & Triggers ---
A_LB=CTRL+SHIFT+TAB
A_RB=CTRL+TAB
A_L2=F5
A_R2=F9

; --- Stick Clicks ---
A_L3=CTRL+ALT+DELETE
A_R3=CTRL+SHIFT+ESC

; --- Menu Buttons ---
A_SELECT=ESC           ; The [...] button
A_START=ENTER          ; The [ = ] button
A_STADIA=WIN+D         ; The main Stadia home button


; ================================================================
; CAPTURE CHORDS (Hold Capture + Press X)
; ================================================================
; --- Face Buttons ---
C_A=MEDIA_PLAY_PAUSE
C_B=MEDIA_STOP
C_X=VOLUME_MUTE
C_Y=MEDIA_NEXT

; --- D-Pad (Supports Hold-to-Repeat) ---
C_UP=VOLUME_UP
C_DOWN=VOLUME_DOWN
C_LEFT=MEDIA_PREV
C_RIGHT=MEDIA_NEXT

; --- Bumpers & Triggers ---
C_LB=SHIFT+F10
C_RB=SHIFT+F11
C_L2=PAGEUP
C_R2=PAGEDOWN

; --- Stick Clicks ---
C_L3=F11
C_R3=F12

; --- Menu Buttons ---
C_SELECT=TAB           ; The [...] button
C_START=WIN+E          ; The [ = ] button
C_STADIA=CTRL+SHIFT+M  ; The main Stadia home button